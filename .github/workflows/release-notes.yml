name: Enrich Release Notes

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append release summary template
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const template = fs.readFileSync('.github/RELEASE_TEMPLATE.md', 'utf8');
            const release = context.payload.release;

            // Don't duplicate if already contains the template
            if (release.body && release.body.includes('Release Summary')) {
              console.log('Template already present, skipping.');
              return;
            }

            const newBody = (release.body || '') + '\n\n---\n\n' + template;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: newBody,
            });

            console.log('Release notes enriched with deploy template.');
