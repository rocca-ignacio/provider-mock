name: Auto-label PRs

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR based on conventional commit title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;

            const rules = [
              { pattern: /^feat(\(.*?\))?[!:]/, label: 'feature' },
              { pattern: /^fix(\(.*?\))?[!:]/, label: 'fix' },
              { pattern: /^perf(\(.*?\))?[!:]/, label: 'performance' },
              { pattern: /^refactor(\(.*?\))?[!:]/, label: 'refactor' },
              { pattern: /^docs(\(.*?\))?[!:]/, label: 'docs' },
              { pattern: /^ci(\(.*?\))?[!:]/, label: 'ci' },
              { pattern: /^build(\(.*?\))?[!:]/, label: 'infra' },
              { pattern: /^chore(\(.*?\))?[!:]/, label: 'chore' },
              { pattern: /^security(\(.*?\))?[!:]/, label: 'security' },
              { pattern: /^test(\(.*?\))?[!:]/, label: 'skip-changelog' },
            ];

            const match = rules.find(r => r.pattern.test(title));
            if (!match) return;

            const label = match.label;

            // Create label if it doesn't exist
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'ededed',
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
